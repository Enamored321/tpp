<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Minimalist Light Theme TSP Graph -->

  <!-- Weak Paths -->
  <g stroke="#cbd5e1" stroke-width="3" stroke-dasharray="8,8">
    <line x1="150" y1="150" x2="650" y2="200" />
    <line x1="150" y1="150" x2="600" y2="400" />
    <line x1="400" y1="100" x2="200" y2="400" />
    <line x1="650" y1="200" x2="450" y2="450" />
  </g>

  <!-- Optimal Path (IWD highlighted) -->
  <g stroke="#2563eb" stroke-width="6" fill="none" stroke-linejoin="round">
    <path d="M150 150 L400 100 L650 200 L600 400 L450 450 L200 400 Z" />
  </g>
  
  <!-- "Water Drops" on paths -->
  <g fill="#60a5fa">
    <circle cx="275" cy="125" r="7" />
    <circle cx="525" cy="150" r="7" />
    <circle cx="625" cy="300" r="7" />
    <circle cx="525" cy="425" r="7" />
    <circle cx="325" cy="425" r="7" />
    <circle cx="175" cy="275" r="7" />
  </g>

  <!-- Nodes (Cities) -->
  <g fill="#ffffff" stroke="#0f172a" stroke-width="4">
    <circle cx="150" cy="150" r="14" />
    <circle cx="400" cy="100" r="14" />
    <circle cx="650" cy="200" r="14" />
    <circle cx="200" cy="400" r="14" />
    <circle cx="450" cy="450" r="14" />
    <circle cx="600" cy="400" r="14" />
  </g>

</svg>
